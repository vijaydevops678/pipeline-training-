# =============================================================
# PIPELINE 03: Understanding Triggers
# This pipeline teaches you different ways to trigger a pipeline
# =============================================================

name: 03 - Triggers Demo

on:
  # Trigger 1: On push to specific branches
  push:
    branches:
      - main
      - develop

  # Trigger 2: On pull request to main
  pull_request:
    branches:
      - main

  # Trigger 3: Manual trigger with INPUT PARAMETERS
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which environment to target'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      debug_mode:
        description: 'Enable debug output?'
        required: false
        default: false
        type: boolean
      custom_message:
        description: 'A custom message to display'
        required: false
        default: 'Hello from manual trigger!'
        type: string

jobs:
  show-trigger-info:
    runs-on: ubuntu-latest

    steps:
      - name: Show How This Pipeline Was Triggered
        run: |
          echo "============================================"
          echo "  TRIGGER INFORMATION"
          echo "============================================"
          echo "Event Type: $GITHUB_EVENT_NAME"
          echo "Branch: $GITHUB_REF_NAME"
          echo "Actor: $GITHUB_ACTOR"
          echo ""

          if [ "$GITHUB_EVENT_NAME" == "push" ]; then
            echo "This was triggered by a PUSH to the repository"
            echo "Someone pushed code to branch: $GITHUB_REF_NAME"
          elif [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            echo "This was triggered by a PULL REQUEST"
          elif [ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]; then
            echo "This was triggered MANUALLY by: $GITHUB_ACTOR"
          fi

      # This step only runs on manual trigger
      - name: Show Manual Trigger Inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "============================================"
          echo "  MANUAL TRIGGER INPUTS"
          echo "============================================"
          echo "Environment: $ENVIRONMENT_INPUT"
          echo "Debug Mode: $DEBUG_INPUT"
          echo "Custom Message: $MESSAGE_INPUT"
        env:
          ENVIRONMENT_INPUT: ${{ github.event.inputs.environment }}
          DEBUG_INPUT: ${{ github.event.inputs.debug_mode }}
          MESSAGE_INPUT: ${{ github.event.inputs.custom_message }}

      # This step only runs on push events
      - name: Show Push Information
        if: github.event_name == 'push'
        run: |
          echo "This was an automatic trigger from pushing code!"
          echo "Commit: $GITHUB_SHA"
