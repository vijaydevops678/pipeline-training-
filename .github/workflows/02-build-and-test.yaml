# =============================================================
# PIPELINE 02: Build and Test
# This pipeline actually works with your code!
# It installs Node.js, installs dependencies, and runs tests
# =============================================================

name: 02 - Build and Test Pipeline

on:
    push:
        branches:
            - master
workflow_dispatch:


jobs:
    build-and-test:
        runs-on: ubuntu-latest


        steps:
        # Step 1: CHECKOUT - Get your code onto the runner
        # Without this step, the runner machine is EMPTY - no code!
        - name: Checkout code
          uses:actions/checkout@v4
          # After this step, all your files (app.js, package.json, etc.)
          # are available on the runner machine

          # Step 2: Verify code was checked out
        - name: Show Files 
          run: |
          echo "=== Files in workspace ==="
          ls -la
          echo ""
          echo "=== Content of package.json ==="
          cat package.json

          # Step 3: SETUP NODE.JS
          # The runner has Node.js pre-installed, but we want a specific version
        -name: Setup Node.js
         uses: actions/setup-node@v3
         with:
           node-version: '20'

          # Step 4: Verify Node.js version
        -name: Check Node.js version
          run: |
           echo "Node.js version:"
           node --version 
           echo "npm version"
           npm --version

            # Step 5: RUN TESTS
        -name: Run tests
         run: npm test

          # Step 6: If we get here, everything passed!
        -name: Success message
         run: |
           echo "============================================"
          echo "  BUILD AND TEST COMPLETED SUCCESSFULLY!"
          echo "  Run Number: $GITHUB_RUN_NUMBER"
          echo "  Branch: $GITHUB_REF_NAME"
          echo "============================================"      





